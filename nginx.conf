server {
    listen 80;
    server_name portal.vekpmt.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.vekpmt.ru;

    ssl_certificate     /etc/letsencrypt/live/portal.vekpmt.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.vekpmt.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Максимальный размер тела запроса (для загрузки файлов до 20 МБ + запас)
    client_max_body_size 60M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Frontend (React build)
    root /var/www/vekpmt-portal/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Загруженные файлы (uploads) — проксируются через бэкенд для проверки авторизации
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Запрет выполнения скриптов из папки uploads
        location ~* \.(php|phtml|phar|pl|py|sh|cgi|jsp|asp|aspx|exe|bat|cmd|com|vbs|ps1)$ {
            deny all;
            return 403;
        }
        access_log off;
    }

    # Статика с кешированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Скрыть nginx версию
    server_tokens off;

    # Защита от кликджекинга и прочие заголовки
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
