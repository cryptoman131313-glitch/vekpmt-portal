server {
    listen 80;
    server_name service.vekpmt.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name service.vekpmt.ru;

    ssl_certificate     /etc/letsencrypt/live/service.vekpmt.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/service.vekpmt.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Frontend (React build)
    root /var/www/vekpmt-portal/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Загруженные файлы (uploads)
    location /uploads/ {
        alias /var/www/vekpmt-portal/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Запрет выполнения скриптов из папки uploads
        location ~* \.(php|pl|py|sh|cgi)$ {
            deny all;
        }
    }

    # Статика с кешированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Скрыть nginx версию
    server_tokens off;

    # Защита от кликджекинга
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
